name: CI

on:
  push:
    branches: [main, master]
  pull_request:

permissions:
  contents: read

jobs:
  app:
    name: Lint · Test · Build (next-app)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install deps
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Test
        run: npm test
      - name: Build
        run: npm run build

  compile-service:
    name: Test (compile-service)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: compile-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install deps
        run: npm ci || npm install
      - name: Test (ca cần Tectonic sẽ tự skip nếu thiếu binary)
        run: npm test

  docker:
    name: Build Docker images
    runs-on: ubuntu-latest
    needs: [app, compile-service]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build next-app image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: ai-latex-generator/next-app:ci
      - name: Build compile-service image
        uses: docker/build-push-action@v6
        with:
          context: ./compile-service
          push: false
          tags: ai-latex-generator/compile-service:ci
