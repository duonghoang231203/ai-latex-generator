# SPIKE — promptfooconfig.yaml tối giản để verify tích hợp Promptfoo custom TS provider.
# KHÔNG dùng cho production. Xem docs/features/e6-prompt-engineering/spike-promptfoo-integration.md
description: "Spike — verify Promptfoo TS provider + path alias @/* + custom scorer tái dùng validateLatex()"

prompts:
  - "{{description}}"

providers:
  - id: file://./lib/prompt-eval/spike/mock-math-provider.ts
    label: mock-happy
  - id: file://./lib/prompt-eval/spike/mock-always-invalid-provider.ts
    label: mock-always-invalid

tests:
  - vars:
      description: "Chứng minh định lý Pythagoras"
    assert:
      - type: contains
        value: "\\documentclass"
      - type: javascript
        value: file://./lib/prompt-eval/spike/validate-latex-scorer.ts
