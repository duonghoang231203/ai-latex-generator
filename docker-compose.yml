services:
  # Reverse proxy + TLS (Caddy auto-HTTPS). Điểm vào DUY NHẤT ra Internet.
  caddy:
    image: caddy:2.8
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      # Địa chỉ site:
      #   - 'http://localhost' (mặc định) → HTTP thuần, không cảnh báo chứng chỉ (local/staging).
      #   - '<domain>' (không scheme) → Caddy tự cấp TLS thật (Let's Encrypt).
      - SITE_ADDRESS=${SITE_ADDRESS:-http://localhost}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      next-app:
        condition: service_healthy

  next-app:
    build:
      context: .
      # NEXT_PUBLIC_* phải có mặt lúc `next build` để inline vào bundle client (trang login).
      args:
        - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
        - NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY=${NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY}
    restart: unless-stopped
    # KHÔNG expose ra host — chỉ Caddy trong mạng nội bộ compose gọi tới.
    expose:
      - "3000"
    environment:
      - HOSTNAME=0.0.0.0
      - PORT=3000
      # Supabase auth: middleware gọi getUser() mỗi request nên bắt buộc có ở runtime.
      - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
      - NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY=${NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY}
      - STORE_BACKEND=${STORE_BACKEND:-file}
      - AI_PROVIDER=${AI_PROVIDER:-mock}
      - AI_API_KEY=${AI_API_KEY:-}
      - AI_MODEL=${AI_MODEL:-}
      - AI_BASE_URL=${AI_BASE_URL:-}
      - AI_TEMPERATURE=${AI_TEMPERATURE:-0.2}
      - AI_MAX_TOKENS=${AI_MAX_TOKENS:-8192}
      - MAX_INPUT_CHARS=${MAX_INPUT_CHARS:-20000}
      - MAX_SOURCE_FILES=${MAX_SOURCE_FILES:-10}
      - MAX_SOURCE_CHARS=${MAX_SOURCE_CHARS:-100000}
      - MAX_PROMPT_SOURCE_CHARS=${MAX_PROMPT_SOURCE_CHARS:-12000}
      - COMPILE_SERVICE_URL=http://compile-service:8080
      - MAX_REPAIR_ATTEMPTS=${MAX_REPAIR_ATTEMPTS:-3}
      - REQUEST_TIMEOUT_MS=${REQUEST_TIMEOUT_MS:-60000}
      - RATE_LIMIT_PER_MINUTE=${RATE_LIMIT_PER_MINUTE:-10}
      - DATA_DIR=${DATA_DIR:-/data}
      - MAX_UPLOAD_BYTES=${MAX_UPLOAD_BYTES:-15728640}
      - OCR_ENABLED=${OCR_ENABLED:-true}
      - OCR_LANGS=${OCR_LANGS:-vie+eng}
      - TESSERACT_CACHE_DIR=/var/cache/tesseract
    volumes:
      # Lưu trữ tài liệu (CRUD + chat-edit) + cache model OCR (bền vững qua restart).
      - documents-data:/data
      - tesseract-cache:/var/cache/tesseract
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://localhost:3000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    depends_on:
      compile-service:
        condition: service_healthy

  compile-service:
    build: ./compile-service
    restart: unless-stopped
    # KHÔNG expose ra Internet. Publish ra LOOPBACK host (127.0.0.1) để `npm run dev`
    # chạy trên máy có thể gọi compile thật; vẫn không mở ra mạng ngoài.
    expose:
      - "8080"
    ports:
      - "127.0.0.1:8080:8080"
    read_only: true
    volumes:
      - type: tmpfs
        target: /tmp/compile
        tmpfs:
          mode: 01777
      - tectonic-cache:/var/cache/tectonic
    environment:
      - PORT=8080
      - COMPILE_TIMEOUT_MS=45000
      - MAX_LATEX_BYTES=1000000
      - WORK_DIR=/tmp/compile
      - XDG_CACHE_HOME=/var/cache/tectonic
      - TECTONIC_CACHE_DIR=/var/cache/tectonic
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://localhost:8080/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s
    # Giới hạn tài nguyên cụ thể (đóng CHK005 của security checklist).
    mem_limit: 1g
    memswap_limit: 1g
    cpus: 1.0
    pids_limit: 256
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

volumes:
  tectonic-cache:
  documents-data:
  tesseract-cache:
  caddy-data:
  caddy-config:
