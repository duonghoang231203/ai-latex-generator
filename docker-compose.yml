services:
  # Reverse proxy + TLS (Caddy auto-HTTPS). Дђiб»ѓm vГ o DUY NHбє¤T ra Internet.
  caddy:
    image: caddy:2.8
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      # Дђб»‹a chб»‰ site:
      #   - 'http://localhost' (mбє·c Д‘б»‹nh) в†’ HTTP thuбє§n, khГґng cбєЈnh bГЎo chб»©ng chб»‰ (local/staging).
      #   - '<domain>' (khГґng scheme) в†’ Caddy tб»± cбєҐp TLS thбє­t (Let's Encrypt).
      - SITE_ADDRESS=${SITE_ADDRESS:-http://localhost}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      next-app:
        condition: service_healthy

  next-app:
    build: .
    restart: unless-stopped
    # KHГ”NG expose ra host вЂ” chб»‰ Caddy trong mбєЎng nб»™i bб»™ compose gб»Ќi tб»›i.
    expose:
      - "3000"
    environment:
      - HOSTNAME=0.0.0.0
      - PORT=3000
      - AI_PROVIDER=${AI_PROVIDER:-mock}
      - AI_API_KEY=${AI_API_KEY:-}
      - AI_MODEL=${AI_MODEL:-}
      - AI_BASE_URL=${AI_BASE_URL:-}
      - AI_TEMPERATURE=${AI_TEMPERATURE:-0.2}
      - AI_MAX_TOKENS=${AI_MAX_TOKENS:-8192}
      - MAX_INPUT_CHARS=${MAX_INPUT_CHARS:-20000}
      - MAX_SOURCE_FILES=${MAX_SOURCE_FILES:-10}
      - MAX_SOURCE_CHARS=${MAX_SOURCE_CHARS:-100000}
      - MAX_PROMPT_SOURCE_CHARS=${MAX_PROMPT_SOURCE_CHARS:-12000}
      - COMPILE_SERVICE_URL=http://compile-service:8080
      - MAX_REPAIR_ATTEMPTS=${MAX_REPAIR_ATTEMPTS:-3}
      - REQUEST_TIMEOUT_MS=${REQUEST_TIMEOUT_MS:-60000}
      - RATE_LIMIT_PER_MINUTE=${RATE_LIMIT_PER_MINUTE:-10}
      - DATA_DIR=${DATA_DIR:-/data}
      - MAX_UPLOAD_BYTES=${MAX_UPLOAD_BYTES:-15728640}
      - OCR_ENABLED=${OCR_ENABLED:-true}
      - OCR_LANGS=${OCR_LANGS:-vie+eng}
      - TESSERACT_CACHE_DIR=/var/cache/tesseract
    volumes:
      # LЖ°u trб»Ї tГ i liб»‡u (CRUD + chat-edit) + cache model OCR (bб»Ѓn vб»Їng qua restart).
      - documents-data:/data
      - tesseract-cache:/var/cache/tesseract
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://localhost:3000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    depends_on:
      compile-service:
        condition: service_healthy

  compile-service:
    build: ./compile-service
    restart: unless-stopped
    # KHГ”NG expose ra Internet. Publish ra LOOPBACK host (127.0.0.1) Д‘б»ѓ `npm run dev`
    # chбєЎy trГЄn mГЎy cГі thб»ѓ gб»Ќi compile thбє­t; vбє«n khГґng mб»џ ra mбєЎng ngoГ i.
    expose:
      - "8080"
    ports:
      - "127.0.0.1:8080:8080"
    read_only: true
    volumes:
      - type: tmpfs
        target: /tmp/compile
        tmpfs:
          mode: 01777
      - tectonic-cache:/var/cache/tectonic
    environment:
      - PORT=8080
      - COMPILE_TIMEOUT_MS=45000
      - MAX_LATEX_BYTES=1000000
      - WORK_DIR=/tmp/compile
      - XDG_CACHE_HOME=/var/cache/tectonic
      - TECTONIC_CACHE_DIR=/var/cache/tectonic
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://localhost:8080/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s
    # Giб»›i hбєЎn tГ i nguyГЄn cб»Ґ thб»ѓ (Д‘Гіng CHK005 cб»§a security checklist).
    mem_limit: 1g
    memswap_limit: 1g
    cpus: 1.0
    pids_limit: 256
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

volumes:
  tectonic-cache:
  documents-data:
  tesseract-cache:
  caddy-data:
  caddy-config:
