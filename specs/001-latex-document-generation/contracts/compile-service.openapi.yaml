openapi: 3.1.0
info:
  title: Compile Service — Tectonic sandbox (MVP)
  version: 1.0.0
  description: >
    Microservice nội bộ (Docker), KHÔNG expose ra Internet. Nhận LaTeX, dựng bằng Tectonic
    --untrusted, trả PDF binary hoặc log lỗi. An toàn là ràng buộc bắt buộc (Nguyên tắc IV).
paths:
  /compile:
    post:
      summary: Compile LaTeX → PDF (untrusted, sandbox)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [latex]
              properties:
                latex: { type: string, description: 'Kích thước ≤ MAX_LATEX_BYTES' }
      responses:
        '200':
          description: Thành công (PDF binary) hoặc compile lỗi (JSON)
          content:
            application/pdf:
              schema: { type: string, format: binary }
            application/json:
              schema:
                type: object
                required: [success, log]
                properties:
                  success: { type: boolean, enum: [false] }
                  log: { type: string }
        '413': { description: Input vượt MAX_LATEX_BYTES }
        '500': { description: Lỗi hệ thống (Tectonic không chạy được / hết tài nguyên / timeout) }
  /health:
    get:
      summary: Health check
      responses:
        '200': { description: OK }
